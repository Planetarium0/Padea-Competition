<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padea Meals</title>
    <meta name="description" content="Rate your meal and choose next week's dinner.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <header class="app-header">
            <div class="logo-sm">
                <span class="logo-icon">🍱</span>
                <span>Padea Meals</span>
            </div>
            <div id="session-info" class="session-badge"></div>
        </header>

        <div id="error-banner" class="error-banner hidden">
            <span id="error-text"></span>
        </div>

        <main class="content">

            <!-- Rating — fully interactive before any data loads -->
            <section class="form-section">
                <h3 class="section-title">Rate today's meal</h3>
                <div class="star-rating" id="star-rating">
                    <button class="star" onclick="app.setRating(1)">★</button>
                    <button class="star" onclick="app.setRating(2)">★</button>
                    <button class="star" onclick="app.setRating(3)">★</button>
                    <button class="star" onclick="app.setRating(4)">★</button>
                    <button class="star" onclick="app.setRating(5)">★</button>
                </div>
                <textarea id="rate-comment" class="comment-box" placeholder="Any comments? (optional)"
                    rows="3"></textarea>
                <button id="btn-submit-rating" class="btn btn-primary btn-lg" onclick="app.submitRating()" disabled>
                    Save Rating
                </button>
                <div id="rating-saved-msg" class="saved-msg hidden">✓ Rating saved!</div>
            </section>

            <!-- Meal preference — loads in background -->
            <section class="form-section">
                <h3 class="section-title">Preferences for next week's meal</h3>

                <div class="dietary-filter-section">
                    <p class="filter-label">Dietary requirements</p>
                    <div id="filter-chips" class="filter-chips"></div>
                </div>

                <div id="meals-loading" class="meals-loading">
                    <div class="spinner spinner-sm"></div>
                    <span>Loading menu…</span>
                </div>
                <div id="menu-items-list" class="menu-list hidden"></div>
            </section>

        </main>
    </div>

    <script src="config.env.js"></script>
    <script src="app.js"></script>
</body>

</html>
